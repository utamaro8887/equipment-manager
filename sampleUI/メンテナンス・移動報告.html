<!DOCTYPE html>

<html lang="ja"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-high": "#e7e8e9",
              "secondary-fixed-dim": "#c7c6ca",
              "on-secondary-fixed-variant": "#46474a",
              "primary-fixed-dim": "#adc6ff",
              "primary": "#0058bd",
              "on-secondary": "#ffffff",
              "on-surface": "#191c1d",
              "primary-container": "#2771df",
              "on-tertiary-fixed-variant": "#41474f",
              "surface-tint": "#005ac1",
              "on-surface-variant": "#424753",
              "surface-dim": "#d9dadb",
              "inverse-primary": "#adc6ff",
              "outline-variant": "#c2c6d5",
              "on-tertiary-fixed": "#161c23",
              "surface-bright": "#f8f9fa",
              "on-tertiary-container": "#fdfcff",
              "on-primary": "#ffffff",
              "on-primary-container": "#fefcff",
              "surface-variant": "#e1e3e4",
              "on-primary-fixed-variant": "#004494",
              "tertiary-container": "#6f757e",
              "tertiary-fixed-dim": "#c1c7d1",
              "on-error-container": "#93000a",
              "on-secondary-fixed": "#1a1b1e",
              "surface-container-highest": "#e1e3e4",
              "inverse-surface": "#2e3132",
              "background": "#f8f9fa",
              "tertiary": "#565d65",
              "error-container": "#ffdad6",
              "on-secondary-container": "#646468",
              "on-error": "#ffffff",
              "secondary": "#5e5e62",
              "surface": "#f8f9fa",
              "surface-container": "#edeeef",
              "on-background": "#191c1d",
              "on-primary-fixed": "#001a41",
              "tertiary-fixed": "#dde3ed",
              "surface-container-lowest": "#ffffff",
              "outline": "#727785",
              "secondary-container": "#e3e2e6",
              "surface-container-low": "#f3f4f5",
              "on-tertiary": "#ffffff",
              "inverse-on-surface": "#f0f1f2",
              "error": "#ba1a1a",
              "secondary-fixed": "#e3e2e6",
              "primary-fixed": "#d8e2ff"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: #f8f9fa;
      }
      h1, h2, h3 {
        font-family: 'Plus Jakarta Sans', sans-serif;
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen pb-32">
<!-- Top Navigation Anchor (As per Shared Components JSON) -->
<header class="fixed top-0 left-0 w-full z-50 bg-white/85 backdrop-blur-2xl flex items-center justify-between px-6 py-4 max-w-full shadow-[0_12px_32px_-4px_rgba(0,88,189,0.06)]">
<div class="flex items-center gap-4">
<button class="p-2 hover:bg-[#f3f4f5] rounded-full transition-all active:scale-95 duration-200 ease-in-out text-[#424753]">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<h1 class="font-['Plus_Jakarta_Sans'] font-bold text-lg tracking-tight text-[#191c1d]">新規登録</h1>
</div>
<div class="flex items-center gap-2">
<button class="text-[#0058bd] font-headline font-bold text-sm px-4 py-2 hover:bg-[#f3f4f5] rounded-full transition-all active:scale-95">
                下書き保存
            </button>
</div>
</header>
<main class="pt-24 px-6 max-w-2xl mx-auto">
<!-- Editorial Header Section -->
<section class="mb-10">
<p class="text-on-surface-variant font-body text-sm mb-2">New Item Entry</p>
<h2 class="text-3xl font-headline font-extrabold text-on-surface tracking-tight">新しい備品をアーカイブする</h2>
</section>
<!-- Form Section -->
<form class="space-y-10">
<!-- Photo Upload Area (Asymmetric Layout) -->
<div class="flex flex-col md:flex-row gap-8 items-start">
<div class="w-full md:w-1/3 aspect-square bg-surface-container-low rounded-xl flex items-center justify-center border-2 border-dashed border-outline-variant/30 group cursor-pointer hover:border-primary/40 transition-colors overflow-hidden">
<div class="text-center p-6">
<span class="material-symbols-outlined text-4xl text-on-surface-variant group-hover:text-primary transition-colors" data-icon="add_a_photo">add_a_photo</span>
<p class="mt-2 text-xs font-label text-on-surface-variant">写真をアップロード</p>
</div>
</div>
<div class="flex-1 space-y-6">
<!-- Item Name -->
<div class="space-y-2">
<label class="block text-sm font-headline font-bold text-on-surface ml-1">アイテム名 <span class="text-error">*</span></label>
<input class="w-full bg-surface-container-lowest border-none ring-1 ring-outline-variant/20 focus:ring-2 focus:ring-primary/40 rounded-xl px-4 py-4 text-on-surface placeholder:text-outline transition-all shadow-sm" placeholder="例: MacBook Pro 14-inch" type="text"/>
<p class="text-[11px] font-label text-on-surface-variant/70 ml-1 italic leading-relaxed">正式な製品名称を入力してください。</p>
</div>
<!-- ID -->
<div class="space-y-2">
<label class="block text-sm font-headline font-bold text-on-surface ml-1">管理ID / SKU</label>
<input class="w-full bg-surface-container-lowest border-none ring-1 ring-outline-variant/20 focus:ring-2 focus:ring-primary/40 rounded-xl px-4 py-4 text-on-surface placeholder:text-outline transition-all shadow-sm" placeholder="INV-2024-001" type="text"/>
</div>
</div>
</div>
<!-- Detailed Metadata Block (Bento Grid Inspired) -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6 p-8 bg-surface-container-low rounded-3xl">
<!-- Category Dropdown -->
<div class="space-y-2">
<label class="block text-xs font-headline font-extrabold uppercase tracking-widest text-on-surface-variant/80 ml-1">カテゴリー</label>
<div class="relative group">
<select class="appearance-none w-full bg-surface-container-lowest border-none ring-1 ring-outline-variant/20 focus:ring-2 focus:ring-primary/40 rounded-xl px-4 py-4 pr-10 text-on-surface shadow-sm cursor-pointer transition-all">
<option disabled="" selected="" value="">選択してください</option>
<option value="it">IT機器</option>
<option value="furniture">家具・オフィス用品</option>
<option value="consumables">消耗品</option>
<option value="others">その他</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant" data-icon="expand_more">expand_more</span>
</div>
</div>
<!-- Status Dropdown -->
<div class="space-y-2">
<label class="block text-xs font-headline font-extrabold uppercase tracking-widest text-on-surface-variant/80 ml-1">ステータス</label>
<div class="relative group">
<select class="appearance-none w-full bg-surface-container-lowest border-none ring-1 ring-outline-variant/20 focus:ring-2 focus:ring-primary/40 rounded-xl px-4 py-4 pr-10 text-on-surface shadow-sm cursor-pointer transition-all">
<option selected="" value="active">利用中</option>
<option value="storage">保管中</option>
<option value="repair">修理中</option>
<option value="disposed">廃棄済</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant" data-icon="check_circle">check_circle</span>
</div>
</div>
<!-- Location Input -->
<div class="md:col-span-2 space-y-2">
<label class="block text-xs font-headline font-extrabold uppercase tracking-widest text-on-surface-variant/80 ml-1">保管場所 / ロケーション</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg" data-icon="location_on">location_on</span>
<input class="w-full bg-surface-container-lowest border-none ring-1 ring-outline-variant/20 focus:ring-2 focus:ring-primary/40 rounded-xl pl-12 pr-4 py-4 text-on-surface shadow-sm placeholder:text-outline transition-all" placeholder="例: 本社 3F A-02" type="text"/>
</div>
</div>
</div>
<!-- Additional Detail Area -->
<div class="space-y-2">
<label class="block text-sm font-headline font-bold text-on-surface ml-1">備考 / メモ</label>
<textarea class="w-full bg-surface-container-lowest border-none ring-1 ring-outline-variant/20 focus:ring-2 focus:ring-primary/40 rounded-xl px-4 py-4 text-on-surface placeholder:text-outline transition-all shadow-sm resize-none" placeholder="特記事項があれば入力してください..." rows="4"></textarea>
</div>
</form>
</main>
<!-- Bottom Action Bar -->
<footer class="fixed bottom-0 left-0 w-full bg-white/85 backdrop-blur-2xl p-6 md:px-12 z-50 shadow-[0_-8px_24px_-4px_rgba(0,88,189,0.04)]">
<div class="max-w-2xl mx-auto flex gap-4">
<button class="flex-1 py-4 px-6 rounded-full bg-surface-container-high text-on-surface font-headline font-bold active:scale-95 duration-150 transition-all">
                キャンセル
            </button>
<button class="flex-[2] py-4 px-6 rounded-full bg-gradient-to-br from-[#0058bd] to-[#2771df] text-white font-headline font-bold shadow-lg shadow-primary/20 active:scale-95 duration-150 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-xl" data-icon="save" data-weight="fill" style="font-variation-settings: 'FILL' 1;">save</span>
                保存する
            </button>
</div>
</footer>
<!-- Decorative Bottom Shell (Responsive Mirroring for Navigation Hierarchy) -->
<div class="md:hidden">
<!-- The BottomNavBar logic from JSON would usually go here, but since this is a transactional focus page, it's suppressed per "Relevance Check" rule. -->
</div>
</body></html>
